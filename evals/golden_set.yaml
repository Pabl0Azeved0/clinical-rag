# Golden set for clinical-rag retrieval evaluation.
#
# Schema:
#   question:            Natural-language question a user might ask.
#   expected_source_url: The MedlinePlus topic URL that should appear in top-k results.
#   notes:               Optional context about why this question/source pairing matters.
#
# Every expected_source_url below is verified to exist in the ingested MedlinePlus
# corpus. Used by evals/run_retrieval_eval.py to measure recall@k and MRR.

# ── Endocrine / metabolic ─────────────────────────────────────────────────────
- question: "What is the A1C test and what does it measure?"
  expected_source_url: "https://medlineplus.gov/a1c.html"
  notes: "Core diabetes management test; should be the top result."

- question: "What is diabetes and what are its main types?"
  expected_source_url: "https://medlineplus.gov/diabetes.html"

- question: "What are the symptoms of an underactive thyroid?"
  expected_source_url: "https://medlineplus.gov/hypothyroidism.html"

- question: "How is obesity defined and what health risks does it carry?"
  expected_source_url: "https://medlineplus.gov/obesity.html"

